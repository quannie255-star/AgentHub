name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ====================================================================
  # Tests — pytest on multiple Python versions
  # ====================================================================
  test:
    name: "pytest (py${{ matrix.python }})"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests
        run: pytest tests/ -v --tb=short --cov=src --cov-report=term-missing

  # ====================================================================
  # Lint — ruff
  # ====================================================================
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff
        run: ruff check src/ tests/ --output-format=github

  # ====================================================================
  # Docker — build images
  # ====================================================================
  docker-build:
    name: Docker build
    runs-on: ubuntu-latest
    needs: [test, lint]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.backend
          push: false
          load: true
          tags: agenthub-backend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.frontend
          push: false
          load: true
          tags: agenthub-frontend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ====================================================================
  # Integration — docker compose up + health check
  # ====================================================================
  integration:
    name: Docker Compose smoke test
    runs-on: ubuntu-latest
    needs: [docker-build]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build images
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.backend
          push: false
          load: true
          tags: agenthub-backend:latest
          cache-from: type=gha

      - name: Build frontend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.frontend
          push: false
          load: true
          tags: agenthub-frontend:latest
          cache-from: type=gha

      - name: Start services
        run: |
          docker compose -f docker/docker-compose.yml up -d
          # Override image tags to use locally-built ones
          # (docker compose will use the :latest tags we just built)

      - name: Wait for backend health
        run: |
          echo "Waiting for backend to be healthy..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8000/health > /dev/null 2>&1; then
              echo "Backend healthy after ${i}s"
              curl -s http://localhost:8000/health | python3 -m json.tool
              exit 0
            fi
            sleep 1
          done
          echo "Backend failed to become healthy"
          docker compose -f docker/docker-compose.yml logs
          exit 1

      - name: Verify API endpoints
        run: |
          # Create session
          SESSION=$(curl -s -X POST http://localhost:8000/api/sessions/ \
            -H "Content-Type: application/json" \
            -d '{"title":"CI Test","participants":["ci-bot"]}')
          echo "Session: $SESSION"

          SESSION_ID=$(echo $SESSION | python3 -c "import sys,json; print(json.load(sys.stdin)['data']['id'])")

          # Send message
          TASK=$(curl -s -X POST http://localhost:8000/api/chat/ \
            -H "Content-Type: application/json" \
            -d "{\"session_id\":\"$SESSION_ID\",\"content\":\"run a quick smoke test\"}")
          echo "Task: $TASK"

          TASK_ID=$(echo $TASK | python3 -c "import sys,json; print(json.load(sys.stdin)['data']['task_id'])")

          # Poll task
          STATUS=$(curl -s http://localhost:8000/api/chat/tasks/$TASK_ID)
          echo "Task status: $STATUS"

          echo "✅ Integration smoke test passed"

      - name: Docker logs (on failure)
        if: failure()
        run: docker compose -f docker/docker-compose.yml logs

      - name: Cleanup
        if: always()
        run: docker compose -f docker/docker-compose.yml down -v
